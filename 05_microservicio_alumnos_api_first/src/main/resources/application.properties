spring.application.name=05_microservicio_alumnos_api_first
#puerto 8001
server.port=8001
#configuracion de la conexion a la base de datos
#utilizando base de datos en memoria H2
spring.datasource.url=jdbc:h2:mem:alumnosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
#configuracion de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
#mostrar las consultas SQL en la consola
spring.jpa.show-sql=true
spring.h2.console.enabled=true
#configuracion del path de la consola H2
spring.h2.console.path=/h2-console
#configuracion de propiedades de nombres de columnas en hibernate

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl